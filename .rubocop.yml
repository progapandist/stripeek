AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false

# This is a single-file dev script, not a library — relax a few cops.
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 25

Metrics/BlockLength:
  Exclude:
    - "scripts/**/*"
